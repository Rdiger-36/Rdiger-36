<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Niklas (Rdiger-36)</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }
    p.subtitle {
      color: #8b949e;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 18px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #0d1117;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s ease;
    }
    button:hover {
      background: var(--accent-hover);
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .status {
      margin-top: 16px;
      font-size: 0.9rem;
    }
    .status.success { color: #3fb950; }
    .status.error { color: #f85149; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📬 Get in touch</h1>
    <p class="subtitle">Got a question, idea, or feedback about one of my projects? Send me a message below.</p>

    <form id="contact-form" action="https://formspree.io/f/xzdqeyoy" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="_replyto" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send message</button>
      <p id="form-status" class="status"></p>
    </form>

    <a class="back-link" href="https://github.com/Rdiger-36">&larr; Back to my GitHub profile</a>
  </div>

  <script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      status.textContent = "Sending...";
      status.className = "status";

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { "Accept": "application/json" }
        });

        if (response.ok) {
          status.textContent = "Thanks! Your message has been sent.";
          status.className = "status success";
          form.reset();
        } else {
          status.textContent = "Oops, something went wrong. Please try again.";
          status.className = "status error";
        }
      } catch (err) {
        status.textContent = "Network error — please try again later.";
        status.className = "status error";
      }
    });
  </script>
</body>
</html>
